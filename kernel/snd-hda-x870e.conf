# Gigabyte X870E AORUS XTREME AI TOP (ALC1220)
# Subsystem: 0x1458:0xa0d5
#
# Requires the kernel patch that adds the gb-aorus-no-automute model.
# Without the patch, fall back to linux/fix-audio.sh instead.
#
# Drop this file into /etc/modprobe.d/
# Drop gigabyte-x870e-alc1220.fw into /lib/firmware/
#
# After placing both files, reload the module:
#   sudo modprobe -r snd_hda_intel && sudo modprobe snd_hda_intel
# Or reboot.
options snd-hda-intel patch=gigabyte-x870e-alc1220.fw
