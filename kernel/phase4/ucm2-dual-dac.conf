# Phase 4 — UCM2 override for ALC1220 dual-DAC routing
#
# USE WHEN: Phase 3 kernel patch creates two analog PCM devices
#   pcm0p = ALC1220 Analog (HP, DAC 0x02)
#   pcm1p = ALC1220 Analog 2 (LineOut, DAC 0x03)  [name TBD]
#   pcm2p = ALC1220 Digital (SPDIF)
#
# This override replaces the generic HiFi-analog.conf behavior:
# - Headphones device -> PCM 0 (DAC 0x02 via mixer 0x0c)
# - Line Out device   -> PCM 1 (DAC 0x03 via mixer 0x0d)
# - No ConflictingDevice — both active simultaneously
# - Independent volume via per-DAC Amp-Out (88 steps each)
#
# INSTALL:
#   sudo mkdir -p /usr/share/alsa/ucm2/conf.d/HDA-Intel
#   sudo cp ucm2-dual-dac.conf \
#     /usr/share/alsa/ucm2/conf.d/HDA-Intel/X870E-ALC1220-DualDAC.conf
#
# TODO: This is a DRAFT. The actual PCM device names and control names
# depend on Phase 2b/3 results. Update PlaybackPCM and mixer element
# names after confirming what the generic parser creates.

Syntax 6

SectionVerb {
	EnableSequence [
		disdevall ""
	]

	Value.TQ "HiFi"
}

SectionDevice."Headphones" {
	Comment "Front Panel Headphones (DAC 0x02)"

	EnableSequence [
		cset "name='Headphone Playback Switch' on"
	]
	DisableSequence [
		cset "name='Headphone Playback Switch' off"
	]

	Value {
		PlaybackPriority 200
		# PCM 0 = DAC 0x02 -> mixer 0x0c -> pin 0x14
		PlaybackPCM "hw:${CardId},0"
		PlaybackMixerElem "Headphone"
		PlaybackMasterElem "Master"
		PlaybackVolume "Headphone Playback Volume"
		PlaybackSwitch "Headphone Playback Switch"
		JackControl "Front Headphone Jack"
	}
}

SectionDevice."Speaker" {
	Comment "Rear Line Out (DAC 0x03)"

	EnableSequence [
		cset "name='Line Out Playback Switch' on"
	]
	DisableSequence [
		cset "name='Line Out Playback Switch' off"
	]

	Value {
		PlaybackPriority 300
		# PCM 1 = DAC 0x03 -> mixer 0x0d -> pin 0x1b
		# TODO: verify this is device 1 after Phase 3 boot
		PlaybackPCM "hw:${CardId},1"
		PlaybackMixerElem "Line Out"
		PlaybackMasterElem "Master"
		PlaybackVolume "Line Out Playback Volume"
		PlaybackSwitch "Line Out Playback Switch"
		JackControl "Line Out Jack"
	}
}

# NOTE: No ConflictingDevice between Headphones and Speaker.
# With independent DACs, both outputs are truly simultaneous.

If.cap-sw {
	Condition {
		Type ControlExists
		Control "name='Capture Switch'"
	}
	True.Include.hifi-mic.File "/HDA/HiFi-mic.conf"
}
